<!-- Lemma detail widget v1. Replace every uppercase placeholder before display. -->
<style>
  .lwd-v1 { --ink:var(--lemma-widget-text,#141414); --muted:var(--lemma-widget-muted,#6b6b6b); --line:var(--lemma-widget-border,#e5e5e5); --surface:var(--lemma-widget-surface,#fff); --subtle:var(--lemma-widget-subtle,#f0efec); --accent:var(--lemma-widget-accent,#6366f1); --radius:var(--lemma-widget-radius,10px); color-scheme:var(--lemma-widget-color-scheme,light); color:var(--ink); font:14px/1.45 var(--lemma-widget-font,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif); }
  .lwd-v1 * { box-sizing:border-box; }
  .lwd-v1 [hidden] { display:none !important; }
  .lwd-v1__card { padding:16px; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); }
  .lwd-v1__eyebrow { color:var(--accent); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .lwd-v1 h2 { margin:4px 0 15px; font-size:21px; letter-spacing:-.02em; }
  .lwd-v1__grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px 18px; }
  .lwd-v1__label { color:var(--muted); font-size:11px; font-weight:650; letter-spacing:.05em; text-transform:uppercase; }
  .lwd-v1__value { margin-top:3px; overflow-wrap:anywhere; }
  .lwd-v1__state { padding:18px; border:1px dashed var(--line); border-radius:var(--radius); background:var(--subtle); color:var(--muted); text-align:center; }
  @media (prefers-color-scheme:dark) { .lwd-v1 { --ink:var(--lemma-widget-text,#ececec); --muted:var(--lemma-widget-muted,#9e9e9e); --line:var(--lemma-widget-border,#2a2a2a); --surface:var(--lemma-widget-surface,#1a1a1a); --subtle:var(--lemma-widget-subtle,#222); --accent:var(--lemma-widget-accent,#818cf8); color-scheme:var(--lemma-widget-color-scheme,dark); } }
</style>
<section class="lwd-v1" data-lemma-widget-version="1">
  <div id="lwd-v1-state" class="lwd-v1__state">Loading details…</div>
  <article id="lwd-v1-card" class="lwd-v1__card" hidden>
    <div class="lwd-v1__eyebrow">__WIDGET_EYEBROW__</div>
    <h2 id="lwd-v1-title"></h2>
    <div id="lwd-v1-grid" class="lwd-v1__grid"></div>
  </article>
</section>
<script>
  (function () {
    var stateEl=document.getElementById("lwd-v1-state");
    var cardEl=document.getElementById("lwd-v1-card");
    var titleEl=document.getElementById("lwd-v1-title");
    var gridEl=document.getElementById("lwd-v1-grid");
    function field(row,key){ return row&&row.data&&row.data[key]!=null?row.data[key]:row&&row[key]; }
    function esc(value){ return String(value==null?"—":value).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
    function fail(message){ stateEl.hidden=false;stateEl.textContent=message||"Unable to load details.";cardEl.hidden=true; }
    function render(row){
      titleEl.textContent=field(row,"__TITLE_FIELD__")||"Untitled";
      var fields=__FIELD_CONFIG__;
      gridEl.innerHTML=fields.map(function(item){return '<div><div class="lwd-v1__label">'+esc(item.label)+'</div><div class="lwd-v1__value">'+esc(field(row,item.field))+'</div></div>';}).join("");
      cardEl.hidden=false;stateEl.hidden=true;
    }
    async function boot(){
      try{
        var client=new window.LemmaClient.LemmaClient();
        var auth=await client.initialize();
        if(!auth||auth.status!=="authenticated"){fail("Sign in to Lemma to view this record.");return;}
        render(await client.records.get("__TABLE_NAME__","__RECORD_ID__"));
      }catch(error){fail(error&&error.message);}
    }
    var cfg=window.__LEMMA_CONFIG__||{};
    if(!cfg.apiUrl){fail("Lemma runtime configuration is unavailable.");return;}
    var sdk=document.createElement("script");
    sdk.src=cfg.apiUrl.replace(/\/$/,"")+"/public/sdk/lemma-client.js";
    sdk.onload=boot;
    sdk.onerror=function(){fail("Could not load the Lemma browser SDK.");};
    document.head.appendChild(sdk);
  })();
</script>
