name: Release Lemma TypeScript SDK

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 1.2.3 or v1.2.3"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: release-lemma-typescript-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lemma-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Require fresh backend protected E2E
        uses: ./.github/actions/require-backend-protected-e2e
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lemma-typescript/package-lock.json

      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.18.0

      - name: Set package version from release tag
        id: version
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          version="${RELEASE_VERSION#v}"
          if [[ ! "${version}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver release tag: ${RELEASE_VERSION}" >&2
            exit 1
          fi

          npm version "${version}" --no-git-tag-version --allow-same-version

          source_version="$(node -e 'const fs=require("fs"); const m=fs.readFileSync("src/version.ts","utf8").match(/SDK_VERSION = "([^"]+)"/); if (!m) process.exit(1); process.stdout.write(m[1])')"
          if [[ "${source_version}" != "${version}" ]]; then
            echo "src/version.ts SDK_VERSION (${source_version}) must match release version ${version}. Commit the release version before publishing." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Verify registry blocks
        run: npm run registry:check

      - name: Check whether version is already published
        id: published
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="${{ steps.version.outputs.version }}"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack package
        if: steps.published.outputs.should_publish == 'true'
        run: npm pack --dry-run

      - name: Publish package
        if: steps.published.outputs.should_publish == 'true'
        run: npm publish
