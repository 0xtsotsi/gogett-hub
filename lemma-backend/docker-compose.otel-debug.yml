name: lemma-otel-debug

services:
  otel-collector:
    image: otel/opentelemetry-collector:0.156.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-debug.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_DEBUG_GRPC_PORT:-14317}:4317"
      - "${OTEL_DEBUG_HTTP_PORT:-14318}:4318"
      - "${OTEL_DEBUG_LLM_GRPC_PORT:-15317}:5317"
      - "${OTEL_DEBUG_LLM_HTTP_PORT:-15318}:5318"
      - "${OTEL_DEBUG_HEALTH_PORT:-14333}:13133"
    restart: unless-stopped
