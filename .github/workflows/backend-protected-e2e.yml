name: Backend protected E2E

on:
  schedule:
    - cron: "41 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protected-runtime:
    name: Real runtime, surface, and document processors
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: backend-protected-e2e
    defaults:
      run:
        working-directory: lemma-backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.1
        with:
          enable-cache: true
      - name: Sync protected dependencies
        run: uv sync --extra markitdown
      - name: Run protected suite
        run: >-
          uv run pytest
          -m "e2e and (slow or workspace or surface_live or indexing or local_cli or protected) and not provider and not mock_sandbox_only"
          --junitxml=protected-e2e.xml
          -o timeout=300
        env:
          E2E_REAL: "1"
          # Keep the protected Docker/runtime axis real without requiring a
          # paid model credential. Provider-only tests remain covered by the
          # deterministic model unless a dedicated real-provider run opts in.
          E2E_LLM_MODE: "mock"
          LEMMA_RUN_SURFACE_LIVE_E2E: "1"
          LEMMA_E2E_OAUTH_CREDENTIALS: ${{ secrets.LEMMA_E2E_OAUTH_CREDENTIALS }}
          LEMMA_E2E_MODEL_MAX_COST_USD: "1.00"
          LEMMA_E2E_MODEL_TIMEOUT_SECONDS: "120"
      - name: Publish commit-linked evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.4.3
        with:
          name: backend-protected-e2e-${{ github.sha }}
          path: lemma-backend/protected-e2e.xml
          if-no-files-found: error
          retention-days: 14
