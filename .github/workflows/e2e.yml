name: Backend E2E (mocked)

# The fast mocked backend e2e suite — mock LLM (deterministic FunctionModel) +
# in-process fake AgentBox, so it needs NO model API keys and NO Docker workspace
# image (Postgres / Redis / SuperTokens come from testcontainers on the runner).
# Excludes slow/worker/workspace/provider/indexing tests (those need the
# real-worker runtime or the Kreuzberg container and are run separately).
#
# The suite is sharded across runners, each serial, so it finishes in ~3min and
# is reliable (no within-runner container contention).
#
# Trigger model: runs automatically once the "CI" workflow (unit tests etc.)
# SUCCEEDS for a PR — so the container-heavy e2e only spins up after the cheap
# checks are green, roughly once per PR update. Also runnable on demand:
# Actions -> "Backend E2E (mocked)" -> Run workflow.
#
# Not a required check yet. To make a green e2e a hard merge requirement later,
# add the "lemma-backend e2e (*)" shard checks (or an aggregation job) to the
# branch-protection rules — it's fast enough now to gate merges.

on:
  workflow_dispatch:
  pull_request:
    # Direct PR events exist only for the opt-in live-surface smoke below.
    # Mocked E2E is launched by workflow_run after CI succeeds.
    types: [labeled]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  backend-e2e:
    name: lemma-backend e2e (${{ matrix.suite.name }})
    # Manual dispatch, or automatically after CI (unit tests etc.) passes on a PR.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    strategy:
      # Run every shard even if one fails, so one red shard doesn't mask others.
      fail-fast: false
      matrix:
        # The fast suite is sharded across runners, each serial (E2E_WORKERS=1):
        # parallelism is across machines, not xdist workers within one machine —
        # which sidesteps the shared-container contention that makes -n2 flaky.
        # Each shard runs the normal fast e2e command under coverage, scoped by
        # E2E_ARGS; the union of all shard args equals the whole fast suite, with
        # `rest` a catch-all via --ignore so a new module's e2e tests are never
        # silently skipped.
        # Shards are balanced by test count (~50-75 each); wall-clock ≈ the
        # slowest shard (~3min).
        suite:
          - name: surfaces
            args: app/modules/agent_surfaces/tests/e2e
          - name: pod
            args: app/modules/pod/tests/e2e
          - name: datastore
            args: app/modules/datastore/tests/e2e app/modules/apps/tests/e2e
          - name: connectors
            args: app/modules/connectors/tests/e2e app/modules/schedule/tests/e2e
          - name: rest
            args: >-
              app/modules app/core
              --ignore=app/modules/agent_surfaces/tests/e2e
              --ignore=app/modules/pod/tests/e2e
              --ignore=app/modules/datastore/tests/e2e
              --ignore=app/modules/apps/tests/e2e
              --ignore=app/modules/connectors/tests/e2e
              --ignore=app/modules/schedule/tests/e2e
    defaults:
      run:
        working-directory: lemma-backend
    steps:
      # On workflow_run, check out the PR head that CI validated (the event
      # otherwise defaults to the repo's default branch).
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      # Every shard runs serially (E2E_WORKERS=1) on its own runner; the shards
      # run in parallel, so the gate's wall-clock is the slowest shard, not their
      # sum. E2E_ARGS scopes each shard to its module paths.
      - name: E2E tests with coverage (mocked LLM + fake AgentBox)
        run: >-
          make coverage-backend-e2e-shard
          E2E_ARGS="${{ matrix.suite.args }}"
          E2E_WORKERS=1
          COVERAGE_PHASE=e2e-${{ matrix.suite.name }}
      - name: Add backend coverage to job summary
        if: always()
        run: |
          if [ -f coverage-backend/comment.md ]; then
            cat coverage-backend/comment.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload backend e2e coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-${{ matrix.suite.name }}-coverage
          include-hidden-files: true
          path: |
            lemma-backend/.coverage.backend
            lemma-backend/coverage-backend/comment.md
            lemma-backend/coverage-backend/summary.json
            lemma-backend/coverage-backend/coverage.json
            lemma-backend/coverage-backend/coverage.xml
            lemma-backend/coverage-backend/html
          if-no-files-found: ignore
      - name: Update PR backend coverage comment
        if: >-
          github.event_name == 'workflow_run' &&
          hashFiles('lemma-backend/coverage-backend/comment.md') != ''
        uses: actions/github-script@v8
        env:
          COVERAGE_PHASE: e2e-${{ matrix.suite.name }}
        with:
          script: |
            const fs = require('fs');
            const marker = `<!-- lemma-backend-coverage:${process.env.COVERAGE_PHASE} -->`;
            const body = fs.readFileSync('lemma-backend/coverage-backend/comment.md', 'utf8');
            const pullRequests = context.payload.workflow_run.pull_requests || [];
            const pr = pullRequests[0];
            if (!pr) {
              core.info('No PR is associated with this workflow_run; skipping coverage comment.');
              return;
            }
            const {owner, repo} = context.repo;
            const {data: pull} = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });
            if (pull.head.repo.full_name !== `${owner}/${repo}`) {
              core.info(`Skipping coverage comment for fork PR ${pull.head.repo.full_name}.`);
              return;
            }
            const issue_number = pr.number;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Could not update backend coverage PR comment: ${error.message}`);
            }

  aggregate-coverage:
    name: backend aggregate coverage gate
    # A skipped producer has no coverage artifacts. Requiring success prevents
    # label-only/direct PR events from running an empty aggregation job.
    if: needs.backend-e2e.result == 'success'
    needs: backend-e2e
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    defaults:
      run:
        working-directory: lemma-backend
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Download E2E coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: backend-e2e-*-coverage
          path: lemma-backend/coverage-artifacts/e2e
      - name: Download validated unit coverage
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: backend-unit-coverage
          path: lemma-backend/coverage-artifacts/unit
      - name: Produce unit coverage for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          make coverage-backend-unit
          mkdir -p coverage-artifacts/unit
          cp .coverage.backend coverage-artifacts/unit/.coverage.backend
      - name: Combine unit and E2E coverage
        shell: bash
        run: |
          mkdir -p coverage-artifacts/combined coverage-backend
          index=0
          while IFS= read -r coverage_file; do
            # Coverage.py discovers parallel inputs by appending a suffix to
            # the configured data-file basename. COVERAGE_FILE below is
            # `.coverage.backend`, so retain that basename here.
            cp "$coverage_file" "coverage-artifacts/combined/.coverage.backend.$index"
            index=$((index + 1))
          done < <(find coverage-artifacts -type f -name '.coverage.backend*')
          if [ "$index" -eq 0 ]; then
            echo "::error::No raw coverage artifacts were downloaded"
            exit 1
          fi
          COVERAGE_FILE="$PWD/.coverage.backend" uv run coverage combine coverage-artifacts/combined
          COVERAGE_FILE="$PWD/.coverage.backend" uv run coverage json -o coverage-backend/coverage.json
          COVERAGE_FILE="$PWD/.coverage.backend" uv run coverage xml -o coverage-backend/coverage.xml
      - name: Enforce total and module floors
        run: >-
          uv run python scripts/check_coverage_thresholds.py
          coverage-backend/coverage.json
          --min-total 70
          --min-module schedule=65
      - name: Enforce changed-code coverage
        run: >-
          uv run diff-cover coverage-backend/coverage.xml
          --compare-branch origin/main
          --fail-under=90
      - name: Upload aggregate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-aggregate-coverage
          path: |
            lemma-backend/coverage-backend/coverage.json
            lemma-backend/coverage-backend/coverage.xml
          if-no-files-found: error

  surface-live-smoke:
    name: agent surfaces live smoke
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'surface-live'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lemma-backend
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      - name: Live provider smoke tests
        run: uv run pytest app/modules/agent_surfaces/tests/e2e/test_surface_live_smoke_e2e.py -m surface_live -o timeout=120
        env:
          LEMMA_RUN_SURFACE_LIVE_E2E: "1"
