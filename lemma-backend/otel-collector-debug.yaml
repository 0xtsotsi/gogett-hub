extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp/general:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  otlp/llm:
    protocols:
      grpc:
        endpoint: 0.0.0.0:5317
      http:
        endpoint: 0.0.0.0:5318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  batch:
    timeout: 1s

exporters:
  debug/general:
    verbosity: detailed
  debug/llm:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    traces/general:
      receivers: [otlp/general]
      processors: [memory_limiter, batch]
      exporters: [debug/general]
    metrics/general:
      receivers: [otlp/general]
      processors: [memory_limiter, batch]
      exporters: [debug/general]
    logs/general:
      receivers: [otlp/general]
      processors: [memory_limiter, batch]
      exporters: [debug/general]
    traces/llm:
      receivers: [otlp/llm]
      processors: [memory_limiter, batch]
      exporters: [debug/llm]
