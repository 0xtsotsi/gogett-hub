name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      python_sdk: ${{ steps.filter.outputs.python_sdk }}
      typescript: ${{ steps.filter.outputs.typescript }}
      frontend: ${{ steps.filter.outputs.frontend }}
      codegen: ${{ steps.filter.outputs.codegen }}
      desktop: ${{ steps.filter.outputs.desktop }}
      agentbox: ${{ steps.filter.outputs.agentbox }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'lemma-backend/**'
              - '.github/workflows/ci.yml'
            python_sdk:
              - 'lemma-python/**'
              - 'lemma-cli/**'
              - 'lemma-pod-bundle/**'
              - 'lemma-skills/**'
              - 'lemma-stack/**'
              - 'install.sh'
              - 'install.ps1'
              - '.github/workflows/ci.yml'
            typescript:
              - 'lemma-typescript/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'lemma-frontend/**'
              - '.github/workflows/ci.yml'
            codegen:
              - 'lemma-python/lemma_sdk/openapi_spec.json'
              - 'lemma-python/lemma_sdk/openapi_client/**'
              - 'lemma-python/lemma_sdk/_spec_info.py'
              - 'lemma-python/scripts/generate_openapi_client.sh'
              - 'lemma-typescript/src/openapi_client/**'
              - 'lemma-typescript/src/react/generated/**'
              - 'lemma-typescript/scripts/generate_openapi_client.sh'
              - 'lemma-typescript/scripts/generate_l2.mjs'
              - 'lemma-typescript/scripts/patch_generated_imports.mjs'
              - '.github/workflows/ci.yml'
            desktop:
              - 'desktop/**'
              - 'lemma-stack/**'
              - 'lemma-frontend/lib/education/concepts.ts'
              - '.github/actions/setup-apple-signing/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release-desktop.yml'
            agentbox:
              - 'agentbox/**'
              - 'agentbox-client/**'
              - '.github/workflows/ci.yml'

  agentbox:
    name: AgentBox providers, state, and runtime
    needs: changes
    if: needs.changes.outputs.agentbox == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentbox
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentbox
          POSTGRES_PASSWORD: agentbox
          POSTGRES_DB: agentbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentbox -d agentbox_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: agentbox/uv.lock
      - name: Install AgentBox with every provider and state backend
        run: uv sync --all-extras --locked
      - name: Ruff
        run: uv run ruff check agentbox tests ../agentbox-client/agentbox_client ../agentbox-client/tests
      - name: AgentBox non-e2e tests with real PostgreSQL parity
        run: uv run python -m pytest tests -m "not e2e"
        env:
          AGENTBOX_TEST_POSTGRES_URL: postgresql://agentbox:agentbox@localhost:5432/agentbox_test
      - name: AgentBox client tests
        run: uv run python -m pytest ../agentbox-client/tests
      - name: Docker daemon smoke
        run: |
          docker version
          docker info
      - name: Real Docker provider contract
        timeout-minutes: 20
        run: >-
          uv run python -m pytest
          tests/e2e/test_local_providers_real_e2e.py
          -m e2e -k docker
          --junitxml=agentbox-docker-e2e.xml

  backend-unit:
    name: lemma-backend unit
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    defaults:
      run:
        working-directory: lemma-backend
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      - name: Unit tests with coverage
        run: make coverage-backend-unit
        env:
          REDIS_URL: redis://localhost:6379
      - name: Add backend coverage to job summary
        if: always()
        run: |
          if [ -f coverage-backend/comment.md ]; then
            cat coverage-backend/comment.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload backend unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-coverage
          include-hidden-files: true
          path: |
            lemma-backend/.coverage.backend
            lemma-backend/coverage-backend/comment.md
            lemma-backend/coverage-backend/summary.json
            lemma-backend/coverage-backend/coverage.json
            lemma-backend/coverage-backend/coverage.xml
            lemma-backend/coverage-backend/html
          if-no-files-found: ignore
  backend-lint:
    name: lemma-backend quality gates
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lemma-backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      - name: Ruff handwritten backend
        run: make lint
      - name: Async-safety lint
        run: make lint-async
      - name: Critical domain type safety
        run: make typecheck-critical
      - name: Architecture, complexity, and broad-catch ratchet
        run: make architecture

  backend-migration:
    name: lemma-backend migration upgrade/downgrade
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lemma-backend
    services:
      postgres:
        image: pgvector/pgvector:0.8.3-pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Verify consolidated reliability migration
        run: uv run python scripts/verify_reliability_migration.py
        env:
          MIGRATION_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/migration_test

  python-sdk:
    name: Python SDK + CLI tests
    needs: changes
    if: needs.changes.outputs.python_sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install SDK + CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ./lemma-python
          pip install -e ./lemma-pod-bundle
          pip install -e ./lemma-cli
          pip install pytest pytest-asyncio
      - name: Test (CLI + Python SDK, offline only)
        # Run each package's tests as a separate pytest invocation so each
        # resolves its own pyproject.toml (markers, strict-markers, rootdir).
        # A single combined run picks lemma-cli's config (strict-markers with
        # only `unit`/`e2e`), which rejects lemma-python's `connector`/`integration`
        # markers. Splitting also lets us exclude docker-only suites per package:
        # lemma-cli e2e tests need postgres/redis/supertokens containers, and
        # lemma-python integration tests need a live Lemma API + LEMMA_TOKEN.
        run: |
          pytest lemma-cli/tests -m "not e2e"
          pytest lemma-python/tests -m "not integration"
          pytest lemma-pod-bundle/tests

  typescript-sdk:
    name: TypeScript SDK checks
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lemma-typescript
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - name: Typecheck (src)
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck (tests)
        run: npx tsc --noEmit -p tsconfig.test.json
      - name: SDK_VERSION matches package.json
        run: |
          PKG=$(node -p "require('./package.json').version")
          SRC=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' src/version.ts | head -1 | tr -d '"')
          echo "package.json=$PKG version.ts=$SRC"
          test "$PKG" = "$SRC" || { echo "::error::src/version.ts SDK_VERSION ($SRC) != package.json version ($PKG)"; exit 1; }
      - name: Browser bundle is fresh
        run: |
          npm run build:bundle
          git diff --exit-code public/lemma-client.js \
            || { echo "::error::Committed public/lemma-client.js is stale — run 'npm run build:bundle' and commit"; exit 1; }
      - name: Unit tests
        run: npx vitest run

  codegen-drift:
    name: Codegen drift gate
    needs: changes
    if: needs.changes.outputs.codegen == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install uv
        run: pip install uv
      - name: Regenerate Python client from committed spec
        working-directory: lemma-python
        run: OPENAPI_FILE=lemma_sdk/openapi_spec.json bash scripts/generate_openapi_client.sh
      - name: Fail on Python drift
        run: |
          git diff --exit-code lemma-python/lemma_sdk/openapi_client lemma-python/lemma_sdk/_spec_info.py \
            || { echo "::error::Committed Python client is out of sync — run scripts/generate_openapi_client.sh and commit"; exit 1; }
      - name: Regenerate TypeScript client from committed spec
        working-directory: lemma-typescript
        run: OPENAPI_FILE=../lemma-python/lemma_sdk/openapi_spec.json bash scripts/generate_openapi_client.sh
      - name: Fail on TypeScript drift
        run: |
          git diff --exit-code lemma-typescript/src/openapi_client \
            || { echo "::error::Committed TypeScript client is out of sync — run scripts/generate_openapi_client.sh and commit"; exit 1; }
      - name: Regenerate L2 hooks from x-lemma metadata
        working-directory: lemma-typescript
        run: node scripts/generate_l2.mjs
      - name: Fail on L2 hook drift
        run: |
          git diff --exit-code lemma-typescript/src/react/generated \
            || { echo "::error::Generated L2 hooks are stale — run 'npm run generate:l2' and commit"; exit 1; }

  frontend-check:
    name: Frontend lint, design audit, test
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            lemma-typescript/package-lock.json
            lemma-frontend/package-lock.json
      - name: Install TypeScript SDK dependencies
        working-directory: lemma-typescript
        run: npm ci
      - name: Install frontend dependencies
        working-directory: lemma-frontend
        run: npm ci
      - name: Lint, typecheck, design audit
        working-directory: lemma-frontend
        run: npm run check
      - name: Frontend unit tests
        working-directory: lemma-frontend
        run: npm test

  frontend-build:
    name: Frontend build (SDK integration)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            lemma-typescript/package-lock.json
            lemma-frontend/package-lock.json
      - name: Install TypeScript SDK dependencies
        working-directory: lemma-typescript
        run: npm ci
      - name: Install frontend dependencies
        working-directory: lemma-frontend
        run: npm ci
      - name: Build frontend (builds the SDK via prebuild)
        working-directory: lemma-frontend
        run: npm run build
      - name: Verify generated SDK browser bundles are committed
        run: git diff --exit-code -- lemma-typescript/public/lemma-client.js lemma-typescript/public/lemma-ui.js

  install-experience:
    name: Install experience (Linux Docker)
    needs: changes
    if: needs.changes.outputs.python_sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run install experience tests
        working-directory: lemma-stack
        run: uv run python -m pytest tests/test_install_experience.py -v

  windows-cli:
    name: Windows CLI smoke test
    needs: changes
    if: needs.changes.outputs.python_sdk == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install lemma-cli from local checkout
        run: uv tool install --force ./lemma-cli
      - name: lemma --version
        run: |
          $ErrorActionPreference = "Stop"
          $lemmaBin = uv tool dir --bin
          $env:PATH = "$lemmaBin;$env:PATH"
          $ver = lemma --version 2>&1
          Write-Host $ver
          $ver | Select-String "lemma 0\." | Out-Null
          if (-not $?) { Write-Error "lemma --version failed"; exit 1 }
      - name: lemma --help
        run: |
          $ErrorActionPreference = "Stop"
          $lemmaBin = uv tool dir --bin
          $env:PATH = "$lemmaBin;$env:PATH"
          $help = lemma --help 2>&1
          Write-Host $help
          $help | Select-String "Usage:" | Out-Null
          if (-not $?) { Write-Error "lemma --help failed"; exit 1 }
      - name: lemma doctor
        run: |
          $lemmaBin = uv tool dir --bin
          $env:PATH = "$lemmaBin;$env:PATH"
          lemma doctor 2>&1
          # doctor may exit 1 if no server; just verify it doesn't crash
      - name: Validate install.ps1
        shell: pwsh
        run: |
          # Static validation of the PowerShell install script
          $content = Get-Content install.ps1 -Raw
          if ($content -notmatch "uv tool install") { Write-Error "install.ps1 missing uv tool install"; exit 1 }
          if ($content -notmatch "lemma-stack") { Write-Error "install.ps1 missing lemma-stack"; exit 1 }
          if ($content -notmatch "ErrorActionPreference") { Write-Error "install.ps1 missing error handling"; exit 1 }
          Write-Host "install.ps1 validation passed"

  desktop:
    name: macOS desktop build + codesign
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/target
          key: desktop-ci-cargo-${{ runner.os }}-${{ hashFiles('desktop/Cargo.lock') }}
          restore-keys: desktop-ci-cargo-${{ runner.os }}-

      - name: Import Developer ID certificate
        id: apple-signing
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/setup-apple-signing
        with:
          certificate: ${{ secrets.APPLE_CERTIFICATE }}
          certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Select Developer ID signing
        if: steps.apple-signing.outcome == 'success'
        env:
          SIGNING_IDENTITY: ${{ steps.apple-signing.outputs.signing-identity }}
        run: |
          echo "APPLE_SIGNING_IDENTITY=${SIGNING_IDENTITY}" >> "${GITHUB_ENV}"
          echo "LEMMA_EXPECTED_SIGNING=developer-id" >> "${GITHUB_ENV}"

      - name: Select ad-hoc signing for untrusted builds
        if: steps.apple-signing.outcome == 'skipped'
        run: |
          echo "APPLE_SIGNING_IDENTITY=-" >> "${GITHUB_ENV}"
          echo "LEMMA_EXPECTED_SIGNING=adhoc" >> "${GITHUB_ENV}"

      - name: Bake splash concepts
        run: node desktop/scripts/extract-concepts.mjs

      - name: Verify baked splash concepts are committed
        run: git diff --exit-code desktop/ui/concepts.gen.json

      - name: Build supervisor sidecar
        run: desktop/scripts/build-sidecar.sh

      - name: Run desktop tests
        working-directory: desktop
        run: cargo test --locked

      - name: Build and codesign DMG
        working-directory: desktop
        run: npx -y @tauri-apps/cli@2.11.4 build --config tauri.dist.conf.json

      - name: Verify application signature
        shell: bash
        run: |
          set -euo pipefail
          app="desktop/target/release/bundle/macos/Lemma.app"
          sidecar="${app}/Contents/MacOS/lemma-supervisor"
          uv="${app}/Contents/MacOS/uv"

          test -d "${app}"
          test -x "${sidecar}"
          test -x "${uv}"
          codesign --verify --deep --strict --verbose=2 "${app}"
          codesign --verify --strict --verbose=2 "${sidecar}"
          codesign --verify --strict --verbose=2 "${uv}"

          signature_info="$(codesign -dvvv "${app}" 2>&1)"
          printf '%s\n' "${signature_info}"
          if [[ "${LEMMA_EXPECTED_SIGNING}" == "developer-id" ]]; then
            grep -F "Authority=Developer ID Application:" <<< "${signature_info}"
          else
            grep -F "Signature=adhoc" <<< "${signature_info}"
          fi

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: lemma-desktop-macos-${{ github.sha }}
          path: desktop/target/release/bundle/dmg/Lemma_*_aarch64.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Remove temporary signing keychain
        if: always() && steps.apple-signing.outcome == 'success'
        run: security delete-keychain "${{ steps.apple-signing.outputs.keychain-path }}"

  ci:
    name: CI passed
    if: always()
    needs:
      - changes
      - backend-unit
      - backend-lint
      - backend-migration
      - python-sdk
      - typescript-sdk
      - codegen-drift
      - frontend-check
      - frontend-build
      - install-experience
      - windows-cli
      - desktop
      - agentbox
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required suite failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::One or more required CI suites failed or were cancelled."
          exit 1
      - run: echo "All required CI suites passed (or were skipped as unaffected)."
